<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bố cục 1 trang cơ bản</title>
</head>
<body>
    <style>
        *{
            margin: 0;
            padding: 0;    
        }
        
        header, section, footer{
            border: 1px #000 solid;
            min-height: 100px;  
        }

        a{
            text-decoration: none;
        }

        ul{
            list-style: none;
            display: flex;
        }
        
        li{
            padding: 5px;
        }
    </style>
    <!--Begin Header-->
     <header>
        <nav>
            <ul>
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Giới thiệu</a></li>
                <li><a href="#">Sản phẩm</a></li>
                <li><a href="#">Dịch vụ</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
        </nav>
     </header>
    <!-- End Header-->
     <!-- Begin body--> 
      <main>
        <section> <!-- một trang có thể dùng nhiều section -->
            <article>
             <p>Giới thiệu về devmaster academy</p>
             <p>devmaster academy luôn đi đầu trong đào tạo CNTT</p>
            </article>
        </section>

        <section>
            <div>
                <h2>Danh sách sản phẩm</h2>
            </div>
        </section>
      </main>
      
     <!-- End Body-->
     <!-- Begin Footer-->  
      <footer>
        <p>Địa chỉ</p>
        <p>Bản quyền</p>
      </footer>
     <!-- End Footer--> 
    
     
</body>
</html>
